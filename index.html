<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
/* HEADER */
.header{background:linear-gradient(135deg,#1a6b3c 0%,#2d9e5f 50%,#1a6b3c 100%);padding:20px 16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.header h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:1px}
.header p{font-size:12px;color:rgba(255,255,255,0.75);margin-top:3px;letter-spacing:2px;text-transform:uppercase}
/* TABS */
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;overflow-x:auto;scrollbar-width:none;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:14px 20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;color:#718096;transition:.2s;flex-shrink:0;margin-bottom:-2px}
.tab:hover{color:#1a6b3c;background:#f7fdf9}
.tab.active{color:#1a6b3c;border-bottom-color:#1a6b3c;background:#f7fdf9}
/* VIEWS */
.view{display:none;padding:16px;max-width:860px;margin:0 auto}
.view.active{display:block}
/* CARDS */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,0.07);padding:16px;margin-bottom:12px;border:1px solid #e8edf2}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.badge-green{background:#d4edda;color:#155724}
.badge-blue{background:#d1ecf1;color:#0c5460}
.badge-yellow{background:#fff3cd;color:#856404}
.badge-gray{background:#f1f3f5;color:#6c757d}
.badge-red{background:#f8d7da;color:#721c24}
/* SECTION LABEL */
.section-label{font-size:11px;font-weight:700;color:#1a6b3c;letter-spacing:2px;text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-label span{flex:1;height:1px;background:#d4edda}
/* GAME ROW */
.game-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:7px;transition:.15s}
.game-row:hover{border-color:#b2dfcc;background:#f7fdf9}
.team-cell{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#2d3748}
/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:14px;text-align:center;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.stat-val{font-size:28px;font-weight:800;color:#1a6b3c}
.stat-lbl{font-size:11px;color:#718096;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
/* RANKING */
.rank-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;margin-bottom:8px;background:#fff;border:1px solid #e2e8f0;transition:.15s}
.rank-row:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.rank-row.gold{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#f6d860}
.rank-row.silver{background:linear-gradient(135deg,#f8f9fa,#e9ecef);border-color:#ced4da}
.rank-row.bronze{background:linear-gradient(135deg,#fff5f0,#ffe8d6);border-color:#f4a261}
.bar-bg{height:6px;background:#e2e8f0;border-radius:3px;flex:1;min-width:60px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .7s ease}
/* AVATAR */
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
/* PALPITES TABLE */
.palpite-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:16px;font-size:11px;font-weight:700;margin:2px}
.chip-exact{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.chip-right{background:#d1ecf1;color:#0c5460;border:1px solid #bee5eb}
.chip-wrong{background:#f8f9fa;color:#adb5bd;border:1px solid #dee2e6}
.chip-empty{background:#f8f9fa;color:#ced4da;border:1px solid #e9ecef;font-style:italic}
/* SELECT */
select,input[type=text]{background:#fff;border:1.5px solid #d1d9e0;border-radius:8px;color:#2d3748;padding:9px 13px;font-size:13px;outline:none;transition:.2s}
select:focus,input[type=text]:focus{border-color:#1a6b3c;box-shadow:0 0 0 3px rgba(26,107,60,0.1)}
/* BUTTON */
.btn{padding:9px 20px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:.15s}
.btn-green{background:#1a6b3c;color:#fff}
.btn-green:hover{background:#145530}
.btn-outline{background:#fff;border:1.5px solid #1a6b3c;color:#1a6b3c}
.btn-outline:hover{background:#f7fdf9}
/* LOADING */
.loading{text-align:center;padding:50px;color:#718096;font-size:14px}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid #d4edda;border-top-color:#1a6b3c;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a6b3c;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.toast.show{opacity:1}
/* NOTICE */
.notice{background:#f0fdf4;border:1.5px solid #b2dfcc;border-radius:10px;padding:12px 16px;font-size:13px;color:#1a6b3c;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px}
/* RULES */
.rules-box{background:#f8f9fa;border-radius:10px;padding:14px 16px;font-size:13px;color:#4a5568;line-height:1.8;border:1px solid #e2e8f0}
.rules-box li{margin-left:16px}
/* SYNC */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
/* RESPONSIVE */
@media(max-width:500px){.header h1{font-size:18px}.tab{padding:12px 14px;font-size:12px}.game-row{flex-wrap:wrap}}
/* PODIUM */
.podium{display:flex;justify-content:center;align-items:flex-end;gap:8px;margin-bottom:24px;padding:20px 0 0}
.podium-item{text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.podium-block{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;width:80px}
.podium-name{font-size:11px;font-weight:700;color:#2d3748;max-width:80px;word-break:break-word;text-align:center}
.podium-pts{font-size:12px;color:#718096}
/* PARTICIPANT CHIPS */
.part-chip{padding:7px 14px;border-radius:20px;border:1.5px solid #d1d9e0;background:#fff;color:#4a5568;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:.15s}
.part-chip:hover{border-color:#1a6b3c;color:#1a6b3c;background:#f7fdf9}
.part-chip.active{border-color:#1a6b3c;background:#1a6b3c;color:#fff}
</style>
</head>
<body>

<div class="header">
  <div style="font-size:28px;margin-bottom:6px">⚽🏆</div>
  <h1>BOLÃO DA COPA 2026</h1>
  <p>Canadá · México · Estados Unidos</p>
  <div style="margin-top:10px;font-size:12px;color:rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;gap:6px">
    <span class="sync-dot" id="sync-dot" style="background:#86efac"></span>
    <span id="sync-text">carregando...</span>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="switchView('palpites')">📋 Palpites por Jogo</div>
  <div class="tab" onclick="switchView('porpart')">👤 Por Participante</div>
  <div class="tab" onclick="switchView('resultados')">⚽ Resultados</div>
  <div class="tab" onclick="switchView('ranking')">🏆 Ranking</div>
</div>

<div id="view-palpites" class="view active"><div class="loading"><span class="spinner"></span>Carregando dados...</div></div>
<div id="view-porpart" class="view"><div class="loading"><span class="spinner"></span>Carregando dados...</div></div>
<div id="view-resultados" class="view"><div class="loading"><span class="spinner"></span>Carregando dados...</div></div>
<div id="view-ranking" class="view"><div class="loading"><span class="spinner"></span>Carregando dados...</div></div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────
// ATENÇÃO: substitua pela URL raw do seu dados.json no GitHub
const DATA_URL = 'dados.json';

const FLAGS = {"México":"🇲🇽","África do Sul":"🇿🇦","Africa do Sul":"🇿🇦","Coreia do Sul":"🇰🇷","Tchéquia":"🇨🇿","Tchequia":"🇨🇿","Canadá":"🇨🇦","Canada":"🇨🇦","Bósnia e Herzegovina":"🇧🇦","Bosnia e Herzegovina":"🇧🇦","Bósnia":"🇧🇦","Estados Unidos":"🇺🇸","Paraguai":"🇵🇾","Catar":"🇶🇦","Suíça":"🇨🇭","Suica":"🇨🇭","Brasil":"🇧🇷","Marrocos":"🇲🇦","Haiti":"🇭🇹","Escócia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Escocia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Austrália":"🇦🇺","Australia":"🇦🇺","Turquia":"🇹🇷","Alemanha":"🇩🇪","Curaçao":"🇨🇼","Curacao":"🇨🇼","Holanda":"🇳🇱","Japão":"🇯🇵","Japao":"🇯🇵","Costa do Marfim":"🇨🇮","Equador":"🇪🇨","Suécia":"🇸🇪","Suecia":"🇸🇪","Tunísia":"🇹🇳","Tunisia":"🇹🇳","Espanha":"🇪🇸","Cabo Verde":"🇨🇻","Bélgica":"🇧🇪","Belgica":"🇧🇪","Egito":"🇪🇬","Arábia Saudita":"🇸🇦","Arabia Saudita":"🇸🇦","Uruguai":"🇺🇾","Irã":"🇮🇷","Ira":"🇮🇷","Nova Zelândia":"🇳🇿","Nova Zelanda":"🇳🇿","França":"🇫🇷","Franca":"🇫🇷","Senegal":"🇸🇳","Iraque":"🇮🇶","Noruega":"🇳🇴","Argentina":"🇦🇷","Argélia":"🇩🇿","Algeria":"🇩🇿","Áustria":"🇦🇹","Austria":"🇦🇹","Jordânia":"🇯🇴","Jordania":"🇯🇴","Portugal":"🇵🇹","RD Congo":"🇨🇩","Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croácia":"🇭🇷","Croatia":"🇭🇷","Gana":"🇬🇭","Panamá":"🇵🇦","Panama":"🇵🇦","Uzbequistão":"🇺🇿","Uzbequistao":"🇺🇿","Colômbia":"🇨🇴","Colombia":"🇨🇴"};
const f = c => FLAGS[c] || '🏳️';

const AVATAR_COLORS = ["#1a6b3c","#2980b9","#8e44ad","#c0392b","#d35400","#16a085","#2c3e50","#f39c12","#27ae60","#2471a3","#7d3c98","#cb4335","#ca6f1e","#148f77","#1c2833","#e67e22","#1abc9c","#3498db","#9b59b6","#e74c3c","#e74c3c","#2ecc71","#f1c40f"];
function avatarColor(name){let h=0;for(let c of name)h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length;return AVATAR_COLORS[h]}
function ini(name){return (name||'?').slice(0,1).toUpperCase()}

// ── STATE ──────────────────────────────────────────────────────────
let D = null; // dados carregados do JSON

// ── LOAD ───────────────────────────────────────────────────────────
async function loadData() {
  setSyncStatus('carregando...','#fbbf24');
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    D = await r.json();
    setSyncStatus('✓ atualizado','#1a6b3c');
    renderAll();
  } catch(e) {
    setSyncStatus('⚠ erro ao carregar','#dc2626');
    document.querySelectorAll('.view.active').forEach(el=>{
      el.innerHTML = `<div class="loading" style="color:#dc2626">
        ⚠️ Não foi possível carregar os dados.<br><br>
        <small>Verifique se o arquivo dados.json está no repositório.</small><br><br>
        <button class="btn btn-green" onclick="loadData()">Tentar novamente</button>
      </div>`;
    });
  }
}

function setSyncStatus(txt, color){
  document.getElementById('sync-text').textContent = txt;
  document.getElementById('sync-dot').style.background = color;
}

function toast(msg, color='#1a6b3c'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── NAVEGAÇÃO ──────────────────────────────────────────────────────
window.switchView = function(v) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['palpites','porpart','resultados','ranking'][i]===v);
  });
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(D) renderView(v);
};

function renderAll(){
  ['palpites','porpart','resultados','ranking'].forEach(v=>renderView(v));
}

function renderView(v){
  if(!D) return;
  if(v==='palpites') renderPalpites();
  else if(v==='porpart') renderPorPart();
  else if(v==='resultados') renderResultados();
  else if(v==='ranking') renderRanking();
}

// ── HELPERS ────────────────────────────────────────────────────────
function ptClass(pts){
  if(pts===3) return 'chip-exact';
  if(pts===1) return 'chip-right';
  if(pts===0) return 'chip-wrong';
  return 'chip-empty';
}
function ptIcon(pts){
  if(pts===3) return '🎯';
  if(pts===1) return '✓';
  if(pts===0) return '✗';
  return '—';
}

// ── ABA PALPITES POR JOGO ──────────────────────────────────────────
function renderPalpites(){
  const el = document.getElementById('view-palpites');
  if(!D || !D.jogos) { el.innerHTML='<div class="loading">Sem dados.</div>'; return; }

  const filterVal = document.getElementById('filter-rodada')?.value || '';
  const rodadas = [...new Set(D.jogos.map(g=>g.rodada||'R1'))];

  let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <select id="filter-rodada" onchange="renderPalpites()" style="flex:1;min-width:140px">
      <option value="">Todas as rodadas</option>
      ${rodadas.map(r=>`<option value="${r}" ${filterVal===r?'selected':''}>${r}</option>`).join('')}
    </select>
    <div style="font-size:12px;color:#718096;margin-left:auto">
      <span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px"><span style="width:10px;height:10px;border-radius:50%;background:#d4edda;border:1px solid #c3e6cb;display:inline-block"></span>Exato +3</span>
      <span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px"><span style="width:10px;height:10px;border-radius:50%;background:#d1ecf1;border:1px solid #bee5eb;display:inline-block"></span>Certo +1</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:50%;background:#f8f9fa;border:1px solid #dee2e6;display:inline-block"></span>Errou</span>
    </div>
  </div>`;

  const jogosFiltrados = filterVal ? D.jogos.filter(g=>(g.rodada||'R1')===filterVal) : D.jogos;

  jogosFiltrados.forEach(g=>{
    const hasResult = g.gols_1_oficial !== null && g.gols_1_oficial !== undefined && g.gols_1_oficial !== '';
    const resLabel = hasResult ? `<span class="badge badge-green">⚽ ${g.gols_1_oficial} × ${g.gols_2_oficial}</span>` : `<span class="badge badge-gray">Aguardando</span>`;

    html += `<div class="card">
      <div class="card-header">
        <div class="team-cell" style="font-size:15px">${f(g.selecao_01)} ${g.selecao_01} <span style="color:#a0aec0;font-weight:400;margin:0 4px">×</span> ${g.selecao_02} ${f(g.selecao_02)}</div>
        <div style="display:flex;align-items:center;gap:8px">${resLabel}<span class="badge badge-gray" style="font-size:10px">${g.rodada||'R1'}</span></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">`;

    (D.participantes || []).forEach(p=>{
      const pal = (D.palpites||[]).find(x=>x.participante===p && Number(x.id_jogo)===Number(g.id_jogo));
      if(!pal){ html += `<span class="palpite-chip chip-empty"><span style="width:18px;height:18px;border-radius:50%;background:${avatarColor(p)};display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff">${ini(p)}</span>${p}: —</span>`; return; }
      const pts = hasResult ? Number(pal.pontos) : null;
      html += `<span class="palpite-chip ${ptClass(pts)}">
        <span style="width:18px;height:18px;border-radius:50%;background:${avatarColor(p)};display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff">${ini(p)}</span>
        ${p}: ${pal.gols_1}×${pal.gols_2}
        ${pts!==null?`<span>${ptIcon(pts)}</span>`:''}
      </span>`;
    });

    html += `</div></div>`;
  });

  el.innerHTML = html;
}

// ── ABA POR PARTICIPANTE ───────────────────────────────────────────
window.renderPorPart = function() {
  const el = document.getElementById('view-porpart');
  if(!D) return;

  const filterVal = document.getElementById('filter-part')?.value || '';

  let html = `<div style="margin-bottom:16px">
    <select id="filter-part" onchange="renderPorPart()" style="width:100%">
      <option value="">Selecione um participante...</option>
      ${(D.participantes||[]).map(p=>`<option value="${p}" ${filterVal===p?'selected':''}>${p}</option>`).join('')}
    </select>
  </div>`;

  if(!filterVal){
    html += `<div class="notice">👆 Selecione um participante para ver todos os palpites dele.</div>`;
    // mostra grade de todos
    html += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">`;
    (D.participantes||[]).forEach(p=>{
      const total = (D.ranking||[]).find(r=>r.participante===p);
      html += `<div class="part-chip" onclick="document.getElementById('filter-part').value='${p.replace(/'/g,"\\'")}';renderPorPart()">
        <div class="avatar" style="background:${avatarColor(p)};width:26px;height:26px;font-size:11px">${ini(p)}</div>
        ${p}
        ${total?`<span class="badge badge-green" style="font-size:10px">${total.pontos}pts</span>`:''}
      </div>`;
    });
    html += '</div>';
    el.innerHTML = html;
    return;
  }

  const palpitesP = (D.palpites||[]).filter(x=>x.participante===filterVal);
  const rankP = (D.ranking||[]).find(r=>r.participante===filterVal);

  html += `<div style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;border-radius:12px;border:1.5px solid #b2dfcc;margin-bottom:16px;flex-wrap:wrap">
    <div class="avatar" style="background:${avatarColor(filterVal)};width:44px;height:44px;font-size:18px">${ini(filterVal)}</div>
    <div>
      <div style="font-size:17px;font-weight:800;color:#1a6b3c">${filterVal}</div>
      ${rankP?`<div style="font-size:12px;color:#718096">${rankP.pontos} pontos · ${rankP.placares_exatos} exatos · ${rankP.posicao}º lugar</div>`:''}
    </div>
    <div style="margin-left:auto;display:flex;gap:6px">
      <span class="badge badge-green">🎯 ${palpitesP.filter(x=>Number(x.pontos)===3).length} exatos</span>
      <span class="badge badge-blue">✓ ${palpitesP.filter(x=>Number(x.pontos)===1).length} certos</span>
      <span class="badge badge-gray">✗ ${palpitesP.filter(x=>Number(x.pontos)===0).length} erros</span>
    </div>
  </div>`;

  const rodadas = [...new Set((D.jogos||[]).map(g=>g.rodada||'R1'))];
  rodadas.forEach(rodada=>{
    const jogosR = (D.jogos||[]).filter(g=>(g.rodada||'R1')===rodada);
    html += `<div class="section-label"><span></span>${rodada}<span></span></div>`;
    jogosR.forEach(g=>{
      const pal = palpitesP.find(x=>Number(x.id_jogo)===Number(g.id_jogo));
      const hasResult = g.gols_1_oficial !== null && g.gols_1_oficial !== undefined && g.gols_1_oficial !== '';
      const pts = (pal && hasResult) ? Number(pal.pontos) : null;
      const ptColors = {3:'#d4edda',1:'#d1ecf1',0:'#f8f9fa'};
      const ptBorder = {3:'#c3e6cb',1:'#bee5eb',0:'#dee2e6'};

      html += `<div class="game-row" style="${pts!==null?`background:${ptColors[pts]};border-color:${ptBorder[pts]}`:''}">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:#2d3748">${f(g.selecao_01)} ${g.selecao_01} × ${g.selecao_02} ${f(g.selecao_02)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
          ${pal
            ? `<div style="text-align:center"><div style="font-size:11px;color:#718096;margin-bottom:2px">Palpite</div><div style="font-size:16px;font-weight:800;color:#1a6b3c">${pal.gols_1} × ${pal.gols_2}</div></div>`
            : `<div style="font-size:12px;color:#a0aec0;font-style:italic">Não palpitou</div>`
          }
          ${hasResult
            ? `<div style="text-align:center"><div style="font-size:11px;color:#718096;margin-bottom:2px">Resultado</div><div style="font-size:16px;font-weight:800;color:#2d3748">${g.gols_1_oficial} × ${g.gols_2_oficial}</div></div>`
            : `<span class="badge badge-gray" style="font-size:10px">Aguardando</span>`
          }
          ${pts!==null
            ? `<div style="text-align:center;min-width:40px"><div style="font-size:18px">${ptIcon(pts)}</div><div style="font-size:13px;font-weight:800;color:${pts===3?'#155724':pts===1?'#0c5460':'#6c757d'}">+${pts}</div></div>`
            : ''
          }
        </div>
      </div>`;
    });
  });

  el.innerHTML = html;
};

// ── ABA RESULTADOS ─────────────────────────────────────────────────
function renderResultados(){
  const el = document.getElementById('view-resultados');
  if(!D || !D.jogos) { el.innerHTML='<div class="loading">Sem dados.</div>'; return; }

  const jogosComRes = D.jogos.filter(g=>g.gols_1_oficial!==null && g.gols_1_oficial!==undefined && g.gols_1_oficial!=='');
  const jogosSemRes = D.jogos.filter(g=>!jogosComRes.includes(g));

  let html = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-val">${jogosComRes.length}</div><div class="stat-lbl">Apurados</div></div>
    <div class="stat-card"><div class="stat-val">${jogosSemRes.length}</div><div class="stat-lbl">Aguardando</div></div>
    <div class="stat-card"><div class="stat-val">${D.jogos.length}</div><div class="stat-lbl">Total</div></div>
  </div>`;

  if(jogosComRes.length > 0){
    html += `<div class="section-label"><span></span>✅ Resultados Apurados<span></span></div>`;
    jogosComRes.forEach(g=>{
      const res = Number(g.gols_1_oficial)>Number(g.gols_2_oficial)?'home':Number(g.gols_2_oficial)>Number(g.gols_1_oficial)?'away':'draw';
      html += `<div class="game-row">
        <div style="flex:1;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
          <div class="team-cell" style="${res==='home'?'color:#1a6b3c;font-weight:800':res==='draw'?'':'color:#718096'}">${f(g.selecao_01)} ${g.selecao_01}</div>
          <div style="text-align:center;flex-shrink:0">
            <div style="font-size:22px;font-weight:800;color:#1a6b3c;letter-spacing:4px">${g.gols_1_oficial} — ${g.gols_2_oficial}</div>
            <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:1px">${g.rodada||'R1'}</div>
          </div>
          <div class="team-cell" style="justify-content:flex-end;${res==='away'?'color:#1a6b3c;font-weight:800':res==='draw'?'':'color:#718096'}">${g.selecao_02} ${f(g.selecao_02)}</div>
        </div>
      </div>`;
    });
  }

  if(jogosSemRes.length > 0){
    html += `<div class="section-label"><span></span>⏳ Aguardando Resultado<span></span></div>`;
    jogosSemRes.forEach(g=>{
      html += `<div class="game-row" style="opacity:.7">
        <div class="team-cell">${f(g.selecao_01)} ${g.selecao_01}</div>
        <div style="flex:1;text-align:center;color:#a0aec0;font-size:13px">× <span style="font-size:10px;background:#f1f3f5;border-radius:10px;padding:2px 8px">${g.rodada||'R1'}</span></div>
        <div class="team-cell" style="justify-content:flex-end">${g.selecao_02} ${f(g.selecao_02)}</div>
      </div>`;
    });
  }

  el.innerHTML = html;
}

// ── ABA RANKING ────────────────────────────────────────────────────
function renderRanking(){
  const el = document.getElementById('view-ranking');
  if(!D || !D.ranking) { el.innerHTML='<div class="loading">Sem dados.</div>'; return; }

  const ranking = D.ranking;
  const top3 = ranking.slice(0,3);
  const maxPts = ranking[0]?.pontos || 1;

  const medals = ['🥇','🥈','🥉'];
  const rowClass = ['gold','silver','bronze'];
  const barColors = ['#f6d860','#ced4da','#f4a261'];
  const podiumH = [100,75,60];
  const podiumBg = ['#f6d860','#ced4da','#f4a261'];
  const podiumOrder = [1,0,2]; // 2nd, 1st, 3rd

  // PÓDIO
  let podHtml = `<div class="podium">`;
  podiumOrder.forEach(idx=>{
    const r = top3[idx];
    if(!r) return;
    podHtml += `<div class="podium-item">
      <div class="avatar" style="background:${avatarColor(r.participante)};width:42px;height:42px;font-size:17px;border:3px solid ${podiumBg[idx]};box-shadow:0 2px 8px rgba(0,0,0,0.15)">${ini(r.participante)}</div>
      <div class="podium-name">${r.participante}</div>
      <div class="podium-pts">${r.pontos}pts</div>
      <div class="podium-block" style="height:${podiumH[idx]}px;background:${podiumBg[idx]};color:${idx===0?'#92400e':'#fff'}">${medals[idx]}</div>
    </div>`;
  });
  podHtml += `</div>`;

  // STATS
  let statsHtml = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-val">${D.jogos?.filter(g=>g.gols_1_oficial!==null&&g.gols_1_oficial!==''&&g.gols_1_oficial!==undefined).length||0}</div><div class="stat-lbl">Jogos apurados</div></div>
    <div class="stat-card"><div class="stat-val">${ranking.length}</div><div class="stat-lbl">Participantes</div></div>
    <div class="stat-card"><div class="stat-val">${ranking[0]?.pontos||0}</div><div class="stat-lbl">Maior pontuação</div></div>
  </div>`;

  // LISTA
  let listHtml = `<div class="section-label"><span></span>Classificação Geral<span></span></div>`;
  ranking.forEach((r,i)=>{
    const cls = i<3?rowClass[i]:'';
    const medal = i<3?`<span style="font-size:20px">${medals[i]}</span>`:`<span style="font-size:13px;color:#718096;font-weight:700">#${i+1}</span>`;
    const pct = maxPts>0?(Number(r.pontos)/maxPts*100).toFixed(0):0;
    const barColor = i<3?barColors[i]:'#a8d5bc';

    listHtml += `<div class="rank-row ${cls}">
      <div style="width:32px;text-align:center;flex-shrink:0">${medal}</div>
      <div class="avatar" style="background:${avatarColor(r.participante)}">${ini(r.participante)}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
          <span style="font-size:15px;font-weight:700;color:#1a3d2b">${r.participante}</span>
          <span style="font-size:22px;font-weight:800;color:#1a6b3c;flex-shrink:0">${r.pontos}<span style="font-size:12px;font-weight:400;color:#718096"> pts</span></span>
        </div>
        <div class="bar-bg" style="margin:5px 0"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        <div style="display:flex;gap:12px;font-size:11px;color:#718096">
          <span>🎯 ${r.placares_exatos} exatos</span>
          <span>📊 ${r.posicao}º lugar</span>
        </div>
      </div>
    </div>`;
  });

  // REGRAS
  let regrasHtml = `<div class="section-label"><span></span>Regras do Bolão<span></span></div>
  <div class="rules-box">
    <ul>
      <li>🎯 <strong>Placar exato</strong> = 3 pontos</li>
      <li>✓ <strong>Acertar o vencedor ou empate</strong> = 1 ponto</li>
      <li>✗ <strong>Errar o resultado</strong> = 0 pontos</li>
      <li>⚠️ Vale o placar do tempo regulamentar</li>
    </ul>
  </div>`;

  el.innerHTML = podHtml + statsHtml + listHtml + regrasHtml;
}

// ── INIT ───────────────────────────────────────────────────────────
loadData();
// Recarrega a cada 5 minutos
setInterval(loadData, 300000);
</script>
