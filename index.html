<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.header{background:linear-gradient(135deg,#1a6b3c 0%,#2d9e5f 50%,#1a6b3c 100%);padding:16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.header h1{font-size:20px;font-weight:800;color:#fff;letter-spacing:1px}
.header p{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px;letter-spacing:2px;text-transform:uppercase}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;overflow-x:auto;scrollbar-width:none;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;color:#718096;transition:.2s;flex-shrink:0;margin-bottom:-2px}
.tab:hover{color:#1a6b3c;background:#f7fdf9}
.tab.active{color:#1a6b3c;border-bottom-color:#1a6b3c;background:#f7fdf9}
.view{display:none;padding:12px;max-width:900px;margin:0 auto}
.view.active{display:block}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.07);padding:12px 14px;margin-bottom:10px;border:1px solid #e8edf2}
.section-label{font-size:10px;font-weight:700;color:#1a6b3c;letter-spacing:2px;text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.section-label span{flex:1;height:1px;background:#d4edda}
.game-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:6px;transition:.15s}
.game-row:hover{border-color:#b2dfcc;background:#f7fdf9}
/* RANKING */
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;margin-bottom:6px;background:#fff;border:1px solid #e2e8f0}
.rank-row.gold{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#f6d860}
.rank-row.silver{background:linear-gradient(135deg,#f8f9fa,#e9ecef);border-color:#ced4da}
.rank-row.bronze{background:linear-gradient(135deg,#fff5f0,#ffe8d6);border-color:#f4a261}
.bar-bg{height:5px;background:#e2e8f0;border-radius:3px;flex:1;min-width:40px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .7s ease}
/* AVATAR */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}
/* CHIPS — palpites */
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:14px;font-size:11px;font-weight:700;margin:2px;white-space:nowrap}
.chip-exact{background:#d4edda;color:#155724;border:1px solid #b2dfcc}
.chip-right{background:#fff3cd;color:#856404;border:1px solid #ffeaa0}
.chip-wrong{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.chip-empty{background:#f8f9fa;color:#adb5bd;border:1px solid #dee2e6;font-style:italic}
/* POINTS BADGE */
.pts-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:800;white-space:nowrap}
.pts-3{background:#d4edda;color:#155724}
.pts-1{background:#fff3cd;color:#856404}
.pts-0{background:#f8d7da;color:#721c24}
.pts-null{background:#f1f3f5;color:#adb5bd}
/* SELECT */
select{background:#fff;border:1.5px solid #d1d9e0;border-radius:8px;color:#2d3748;padding:8px 12px;font-size:13px;outline:none;transition:.2s;width:100%}
select:focus{border-color:#1a6b3c}
/* LOADING */
.loading{text-align:center;padding:40px;color:#718096;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #d4edda;border-top-color:#1a6b3c;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a6b3c;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.part-chip{padding:6px 12px;border-radius:18px;border:1.5px solid #d1d9e0;background:#fff;color:#4a5568;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:.15s;margin:3px}
.part-chip:hover{border-color:#1a6b3c;color:#1a6b3c}
.part-chip.active{border-color:#1a6b3c;background:#1a6b3c;color:#fff}
.rules-box{background:#f8f9fa;border-radius:10px;padding:12px 14px;font-size:13px;color:#4a5568;line-height:1.8;border:1px solid #e2e8f0}
.rules-box li{margin-left:16px}
@media(max-width:500px){.header h1{font-size:17px}.tab{padding:10px 12px;font-size:12px}}
</style>
</head>
<body>

<div class="header">
  <div style="font-size:24px;margin-bottom:4px">⚽🏆</div>
  <h1>BOLÃO DA COPA 2026</h1>
  <p>Canadá · México · Estados Unidos</p>
  <div style="margin-top:8px;font-size:11px;color:rgba(255,255,255,0.65);display:flex;align-items:center;justify-content:center;gap:5px">
    <span class="sync-dot" id="sync-dot" style="background:#86efac"></span>
    <span id="sync-text">carregando...</span>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="switchView('palpites')">📋 Palpites por Jogo</div>
  <div class="tab" onclick="switchView('porpart')">👤 Por Participante</div>
  <div class="tab" onclick="switchView('resultados')">⚽ Resultados</div>
  <div class="tab" onclick="switchView('ranking')">🏆 Ranking</div>
</div>

<div id="view-palpites" class="view active"><div class="loading"><span class="spinner"></span>Carregando...</div></div>
<div id="view-porpart" class="view"><div class="loading"><span class="spinner"></span>Carregando...</div></div>
<div id="view-resultados" class="view"><div class="loading"><span class="spinner"></span>Carregando...</div></div>
<div id="view-ranking" class="view"><div class="loading"><span class="spinner"></span>Carregando...</div></div>

<div class="toast" id="toast"></div>

<script>
const DATA_URL = 'dados.json';

const FLAGS={"México":"🇲🇽","África do Sul":"🇿🇦","Africa do Sul":"🇿🇦","Coreia do Sul":"🇰🇷","Tchéquia":"🇨🇿","Tchequia":"🇨🇿","Canadá":"🇨🇦","Canada":"🇨🇦","Bósnia e Herzegovina":"🇧🇦","Bosnia e Herzegovina":"🇧🇦","Estados Unidos":"🇺🇸","Paraguai":"🇵🇾","Catar":"🇶🇦","Suíça":"🇨🇭","Suica":"🇨🇭","Brasil":"🇧🇷","Marrocos":"🇲🇦","Haiti":"🇭🇹","Escócia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Escocia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Austrália":"🇦🇺","Australia":"🇦🇺","Turquia":"🇹🇷","Alemanha":"🇩🇪","Curaçao":"🇨🇼","Curacao":"🇨🇼","Holanda":"🇳🇱","Japão":"🇯🇵","Japao":"🇯🇵","Costa do Marfim":"🇨🇮","Equador":"🇪🇨","Suécia":"🇸🇪","Suecia":"🇸🇪","Tunísia":"🇹🇳","Tunisia":"🇹🇳","Espanha":"🇪🇸","Cabo Verde":"🇨🇻","Bélgica":"🇧🇪","Belgica":"🇧🇪","Egito":"🇪🇬","Arábia Saudita":"🇸🇦","Arabia Saudita":"🇸🇦","Uruguai":"🇺🇾","Irã":"🇮🇷","Ira":"🇮🇷","Nova Zelândia":"🇳🇿","Nova Zelanda":"🇳🇿","França":"🇫🇷","Franca":"🇫🇷","Senegal":"🇸🇳","Iraque":"🇮🇶","Noruega":"🇳🇴","Argentina":"🇦🇷","Argélia":"🇩🇿","Algeria":"🇩🇿","Áustria":"🇦🇹","Austria":"🇦🇹","Jordânia":"🇯🇴","Jordania":"🇯🇴","Portugal":"🇵🇹","RD Congo":"🇨🇩","Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croácia":"🇭🇷","Croatia":"🇭🇷","Gana":"🇬🇭","Panamá":"🇵🇦","Panama":"🇵🇦","Uzbequistão":"🇺🇿","Uzbequistao":"🇺🇿","Colômbia":"🇨🇴","Colombia":"🇨🇴"};
const f=c=>FLAGS[c]||'🏳️';

const AVCOLS=["#1a6b3c","#2980b9","#8e44ad","#c0392b","#d35400","#16a085","#2c3e50","#f39c12","#27ae60","#2471a3","#7d3c98","#cb4335","#ca6f1e","#148f77","#1c2833","#e67e22","#1abc9c","#3498db","#9b59b6","#e74c3c","#e8590c","#2ecc71","#f1c40f","#6c3483"];
function avc(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))%AVCOLS.length;return AVCOLS[h]}
function ini(n){return(n||'?').slice(0,1).toUpperCase()}

let D=null;

async function loadData(){
  setSyncStatus('carregando...','#fbbf24');
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    D=await r.json();
    setSyncStatus('✓ atualizado','#1a6b3c');
    renderAll();
  }catch(e){
    setSyncStatus('⚠ erro','#dc2626');
    document.querySelectorAll('.view.active').forEach(el=>{
      el.innerHTML=`<div class="loading" style="color:#dc2626">⚠️ Erro ao carregar dados.<br><br><button onclick="loadData()" style="padding:8px 18px;border-radius:8px;background:#1a6b3c;color:#fff;border:none;cursor:pointer;font-weight:700">Tentar novamente</button></div>`;
    });
  }
}

function setSyncStatus(t,c){document.getElementById('sync-text').textContent=t;document.getElementById('sync-dot').style.background=c;}

window.switchView=function(v){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['palpites','porpart','resultados','ranking'][i]===v));
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(D)renderView(v);
};

function renderAll(){['palpites','porpart','resultados','ranking'].forEach(v=>renderView(v));}
function renderView(v){
  if(!D)return;
  if(v==='palpites')renderPalpites();
  else if(v==='porpart')renderPorPart();
  else if(v==='resultados')renderResultados();
  else if(v==='ranking')renderRanking();
}

// ── HELPERS ────────────────────────────────────────────────────────
function ptsClass(pts){
  if(pts===3)return'chip-exact';
  if(pts===1)return'chip-right';
  if(pts===0)return'chip-wrong';
  return'chip-empty';
}
function ptsIcon(pts){
  if(pts===3)return'🎯';
  if(pts===1)return'✓';
  if(pts===0)return'✗';
  return'—';
}
function ptsBadge(pts){
  if(pts===null||pts===undefined)return'';
  const cls=pts===3?'pts-3':pts===1?'pts-1':'pts-0';
  const sign=pts>0?'+':'';
  return`<span class="pts-badge ${cls}">${sign}${pts}</span>`;
}

// ── ABA 1 — PALPITES POR JOGO ─────────────────────────────────────
function renderPalpites(){
  const el=document.getElementById('view-palpites');
  if(!D||!D.jogos){el.innerHTML='<div class="loading">Sem dados.</div>';return;}

  const filterVal=document.getElementById('fp-rodada')?.value||'';
  const rodadas=[...new Set(D.jogos.map(g=>g.rodada||'R1'))];

  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <select id="fp-rodada" onchange="renderPalpites()" style="flex:1;min-width:130px">
      <option value="">Todas as rodadas</option>
      ${rodadas.map(r=>`<option value="${r}" ${filterVal===r?'selected':''}>${r}</option>`).join('')}
    </select>
    <div style="font-size:11px;color:#718096;display:flex;gap:8px;flex-wrap:wrap">
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:50%;background:#d4edda;border:1px solid #b2dfcc;display:inline-block"></span>Exato +3</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:50%;background:#fff3cd;border:1px solid #ffeaa0;display:inline-block"></span>Certo +1</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:50%;background:#f8d7da;border:1px solid #f5c6cb;display:inline-block"></span>Errou</span>
    </div>
  </div>`;

  const jogos=filterVal?D.jogos.filter(g=>(g.rodada||'R1')===filterVal):D.jogos;

  jogos.forEach(g=>{
    const hasRes=g.gols_1_oficial!==null&&g.gols_1_oficial!==undefined&&g.gols_1_oficial!=='';
    const resBadge=hasRes
      ?`<span style="background:#d4edda;color:#155724;border:1px solid #b2dfcc;border-radius:10px;padding:2px 9px;font-size:12px;font-weight:700">⚽ ${g.gols_1_oficial} × ${g.gols_2_oficial}</span>`
      :`<span style="background:#f1f3f5;color:#adb5bd;border-radius:10px;padding:2px 9px;font-size:11px">Aguardando</span>`;

    const dataHora=(g.data||g.hora)?`<span style="font-size:10px;color:#718096;margin-left:6px">📅 ${g.data||''}${g.data&&g.hora?' · ':''}${g.hora||''}</span>`:'';
    html+=`<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
          <span style="font-size:14px;font-weight:700;color:#1a3d2b">${f(g.selecao_01)} ${g.selecao_01} <span style="color:#a0aec0;font-weight:400;margin:0 3px">×</span> ${g.selecao_02} ${f(g.selecao_02)}</span>
          ${dataHora}
        </div>
        <div style="display:flex;align-items:center;gap:6px">${resBadge}<span style="background:#f1f3f5;color:#718096;border-radius:8px;padding:1px 7px;font-size:10px;font-weight:700">${g.rodada||'R1'}</span></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:2px">`;

    (D.participantes||[]).forEach(p=>{
      const pal=(D.palpites||[]).find(x=>x.participante===p&&Number(x.id_jogo)===Number(g.id_jogo));
      if(!pal){
        html+=`<span class="chip" style="background:#eef2f7;color:#94a3b8;border:1.5px dashed #cbd5e1;font-style:italic">
          <span style="width:16px;height:16px;border-radius:50%;background:${avc(p)};display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#fff;flex-shrink:0;opacity:0.6">${ini(p)}</span>${p}: sem palpite</span>`;
        return;
      }
      const pts=hasRes?Number(pal.pontos):null;
      html+=`<span class="chip ${ptsClass(pts)}">
        <span style="width:16px;height:16px;border-radius:50%;background:${avc(p)};display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#fff;flex-shrink:0">${ini(p)}</span>
        ${p}: ${pal.gols_1}×${pal.gols_2}
        ${pts!==null?` ${ptsBadge(pts)}`:''}
      </span>`;
    });

    html+=`</div></div>`;
  });
  el.innerHTML=html;
}

// ── ABA 2 — POR PARTICIPANTE ──────────────────────────────────────
window.renderPorPart=function(){
  const el=document.getElementById('view-porpart');
  if(!D)return;
  const filterVal=document.getElementById('filter-part')?.value||'';

  const rodadaVal=document.getElementById('filter-part-rodada')?.value||'';
  const rodadas=[...new Set((D.jogos||[]).map(g=>g.rodada||'R1'))];

  let html=`<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <select id="filter-part" onchange="renderPorPart()" style="flex:2;min-width:160px">
      <option value="">Selecione um participante...</option>
      ${(D.participantes||[]).map(p=>`<option value="${p}" ${filterVal===p?'selected':''}>${p}</option>`).join('')}
    </select>
    <select id="filter-part-rodada" onchange="renderPorPart()" style="flex:1;min-width:100px">
      <option value="" ${rodadaVal===''?'selected':''}>Todas as rodadas</option>
      ${rodadas.map(r=>`<option value="${r}" ${rodadaVal===r?'selected':''}>${r}</option>`).join('')}
    </select>
  </div>`;

  if(!filterVal){
    html+=`<div style="background:#f0fdf4;border:1.5px solid #b2dfcc;border-radius:10px;padding:10px 14px;font-size:13px;color:#1a6b3c;margin-bottom:14px">👆 Selecione um participante para ver todos os palpites.</div>`;
    html+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
    (D.participantes||[]).forEach(p=>{
      const rank=(D.ranking||[]).find(r=>r.participante===p);
      html+=`<div class="part-chip" onclick="document.getElementById('filter-part').value='${p.replace(/'/g,"\\'")}';renderPorPart()">
        <div class="avatar" style="background:${avc(p)};width:22px;height:22px;font-size:9px">${ini(p)}</div>
        ${p}${rank?` <span style="background:#d4edda;color:#155724;border-radius:8px;padding:1px 5px;font-size:10px">${rank.pontos}pts</span>`:''}
      </div>`;
    });
    html+='</div>';
    el.innerHTML=html;
    return;
  }

  const palpitesP=(D.palpites||[]).filter(x=>x.participante===filterVal);
  const rankP=(D.ranking||[]).find(r=>r.participante===filterVal);

  // Calcula contadores filtrando por rodada se necessário
  const jogosRodada=rodadaVal?(D.jogos||[]).filter(g=>(g.rodada||'R1')===rodadaVal).map(g=>g.id_jogo):(D.jogos||[]).map(g=>g.id_jogo);
  const palpitesFiltrados=palpitesP.filter(x=>jogosRodada.includes(Number(x.id_jogo)));
  let exatos=0,certos=0,erros=0,pendentes=0;
  palpitesFiltrados.forEach(x=>{
    if(x.pontos===null||x.pontos===undefined){pendentes++;return;}
    if(Number(x.pontos)===3)exatos++;
    else if(Number(x.pontos)===1)certos++;
    else erros++;
  });

  html+=`<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-radius:10px;border:1.5px solid #b2dfcc;margin-bottom:14px;flex-wrap:wrap">
    <div class="avatar" style="background:${avc(filterVal)};width:40px;height:40px;font-size:16px">${ini(filterVal)}</div>
    <div>
      <div style="font-size:16px;font-weight:800;color:#1a6b3c">${filterVal}</div>
      ${rankP?`<div style="font-size:11px;color:#718096">${rankP.pontos} pontos · ${rankP.posicao}º lugar</div>`:''}
    </div>
    <div style="margin-left:auto;display:flex;gap:5px;flex-wrap:wrap">
      <span style="background:#d4edda;color:#155724;border-radius:8px;padding:3px 9px;font-size:11px;font-weight:700">🎯 ${exatos} exatos</span>
      <span style="background:#fff3cd;color:#856404;border-radius:8px;padding:3px 9px;font-size:11px;font-weight:700">✓ ${certos} certos</span>
      <span style="background:#f8d7da;color:#721c24;border-radius:8px;padding:3px 9px;font-size:11px;font-weight:700">✗ ${erros} erros</span>
      ${pendentes>0?`<span style="background:#f1f3f5;color:#718096;border-radius:8px;padding:3px 9px;font-size:11px;font-weight:700">⏳ ${pendentes}</span>`:''}
    </div>
  </div>`;

  const todasRodadas=[...new Set((D.jogos||[]).map(g=>g.rodada||'R1'))];
  const rodadasExibir=rodadaVal?[rodadaVal]:todasRodadas;
  rodadasExibir.forEach(rodada=>{
    const jogosR=(D.jogos||[]).filter(g=>(g.rodada||'R1')===rodada);
    if(jogosR.length===0)return;
    html+=`<div class="section-label"><span></span>${rodada}<span></span></div>`;
    jogosR.forEach(g=>{
      const pal=palpitesP.find(x=>Number(x.id_jogo)===Number(g.id_jogo));
      const hasRes=g.gols_1_oficial!==null&&g.gols_1_oficial!==undefined&&g.gols_1_oficial!=='';
      const pts=(pal&&hasRes&&pal.pontos!==null&&pal.pontos!==undefined)?Number(pal.pontos):null;
      const bgMap={3:'#d4edda',1:'#fff3cd',0:'#f8d7da'};
      const bdMap={3:'#b2dfcc',1:'#ffeaa0',0:'#f5c6cb'};
      const rowStyle=pts!==null?`background:${bgMap[pts]};border-color:${bdMap[pts]}`:'';

      html+=`<div class="game-row" style="${rowStyle}">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:#1a3d2b">${f(g.selecao_01)} ${g.selecao_01} × ${g.selecao_02} ${f(g.selecao_02)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
          ${pal

// ── ABA 4 — RANKING ───────────────────────────────────────────────
function rowStyle(pos){
  const p=String(pos).replace('º','').replace('°','').trim();
  if(p==='1') return {cls:'gold',  barColor:'#f6d860', posColor:'#92400e', posBg:'#fef3c7', posBorder:'#f6d860'};
  if(p==='2') return {cls:'silver',barColor:'#ced4da', posColor:'#495057', posBg:'#e9ecef', posBorder:'#ced4da'};
  if(p==='3') return {cls:'bronze',barColor:'#f4a261', posColor:'#7c3000', posBg:'#ffe8d6', posBorder:'#f4a261'};
  return {cls:'normal', barColor:'#a8d5bc', posColor:'#718096', posBg:'#f8f9fa', posBorder:'#e2e8f0'};
}

function renderRanking(){
  const el=document.getElementById('view-ranking');
  if(!D||!D.ranking){el.innerHTML='<div class="loading">Sem dados.</div>';return;}

  const ranking=D.ranking;

  let html=`

        <span style="font-size:14px;font-weight:800;color:${st.posColor}">${pos}º</span>
      </div>
      <div class="avatar" style="background:${avc(r.participante)};width:26px;height:26px;font-size:10px;flex-shrink:0">${ini(r.participante)}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
          <span style="font-size:13px;font-weight:700;color:#1a3d2b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.participante}</span>

        </div>

// ── COMPARTILHAR ──────────────────────────────────────────────────
function roundRect(ctx,x,y,w,h,r){
  if(w<0)w=0;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.fill();
}

function gerarCanvas(){
  const ranking=D.ranking;
  const maxPts=Number(ranking[0]?.pontos)||1;
  const agora=D.atualizado_em?new Date(D.atualizado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
  const W=480,LINHA=46,HEADER=88,FOOTER=30;
  const H=HEADER+(ranking.length*LINHA)+FOOTER+16;
  const canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');

  // Fundo geral
  ctx.fillStyle='#f0f4f8';
  ctx.fillRect(0,0,W,H);

  // Header
  const grad=ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'#1a6b3c');
  grad.addColorStop(0.5,'#2d9e5f');
  grad.addColorStop(1,'#1a6b3c');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,HEADER);
  ctx.fillStyle='#fff';
  ctx.font='bold 17px Arial';
  ctx.textAlign='center';
  ctx.fillText('⚽ BOLÃO DA COPA 2026',W/2,32);
  ctx.font='11px Arial';
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.fillText('CLASSIFICAÇÃO GERAL',W/2,52);
  ctx.font='10px Arial';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('Atualizado: '+agora,W/2,70);

  const barColors={1:'#f6d860',2:'#ced4da',3:'#f4a261'};
  const posCfg={
    1:{bg:'#fef3c7',border:'#f6d860',txt:'#92400e',row:'#fffbeb'},
    2:{bg:'#e9ecef',border:'#ced4da',txt:'#495057',row:'#f8f9fa'},
    3:{bg:'#ffe8d6',border:'#f4a261',txt:'#7c3000',row:'#fff5f0'}
  };

  ranking.forEach((r,i)=>{
    const y=HEADER+(i*LINHA);
    const posNum=Number(String(r.posicao||'').replace(/[º°]/g,'').trim());
    const cfg=posCfg[posNum]||{bg:'#f8f9fa',border:'#e2e8f0',txt:'#718096',row:'#ffffff'};

    // Fundo linha
    ctx.fillStyle=cfg.row;
    ctx.fillRect(8,y+3,W-16,LINHA-4);

    // Barra lateral colorida top3
    if(posNum<=3){
      ctx.fillStyle=barColors[posNum];
      ctx.fillRect(8,y+3,4,LINHA-4);
    }

    // Badge posição
    ctx.fillStyle=cfg.bg;
    roundRect(ctx,16,y+10,34,24,5);
    ctx.strokeStyle=cfg.border;
    ctx.lineWidth=1;
    ctx.strokeRect(16,y+10,34,24);
    ctx.fillStyle=cfg.txt;
    ctx.font='bold 12px Arial';
    ctx.textAlign='center';
    ctx.fillText(posNum+'º',33,y+26);

    // Avatar
    ctx.fillStyle=avc(r.participante);
    ctx.beginPath();
    ctx.arc(70,y+LINHA/2,12,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='bold 10px Arial';
    ctx.textAlign='center';
    ctx.fillText(ini(r.participante),70,y+LINHA/2+4);

    // Nome
    ctx.fillStyle='#1a3d2b';
    ctx.font='bold 13px Arial';
    ctx.textAlign='left';
    ctx.fillText(r.participante,90,y+20);

    // Exatos
    ctx.fillStyle='#718096';
    ctx.font='10px Arial';
    ctx.fillText('🎯 '+r.placares_exatos+' exatos',90,y+34);

    // Pontos
    ctx.fillStyle='#1a6b3c';
    ctx.font='bold 17px Arial';
    ctx.textAlign='right';
    ctx.fillText(r.pontos,W-16,y+22);
    ctx.fillStyle='#718096';
    ctx.font='9px Arial';
    ctx.fillText('pts',W-16,y+34);

    // Barra progresso
    const bx=90, bw=W-160, bh=3, by=y+39;
    ctx.fillStyle='#e2e8f0';
    roundRect(ctx,bx,by,bw,bh,2);
    const fill=Math.max(0,bw*(Number(r.pontos)/maxPts));
    if(fill>0){
      ctx.fillStyle=barColors[posNum]||'#a8d5bc';
      roundRect(ctx,bx,by,fill,bh,2);
    }
  });

  // Footer
  ctx.fillStyle='#a0aec0';
  ctx.font='10px Arial';
  ctx.textAlign='center';
  ctx.fillText('eportugaljr.github.io/bolao-copa-2026',W/2,H-10);

  return canvas;
}

window.compartilharImagem=function(){
  try{
    const canvas=gerarCanvas();
    const link=document.createElement('a');
    link.download='ranking-bolao-copa2026.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
  }catch(e){alert('Erro ao gerar imagem: '+e.message);}
};
